name: Prettier Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Prettier check
        run: |
          git ls-files -z | xargs -0 npx prettier --check --ignore-unknown
